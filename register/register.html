<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aether — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="register.css" />
</head>
<body>

<div class="page">
  <div class="left">
    <div class="form-box">
      <div class="form-title">Create Account</div>

      <div class="input-wrap" id="wrapName">
        <input type="text" id="regName" placeholder="Full Name" autocomplete="name" />
      </div>
      <div class="field-err" id="errName">Please enter your full name.</div>

      <div class="input-wrap" id="wrapEmail">
        <input type="email" id="regEmail" placeholder="Email" autocomplete="email" />
      </div>
      <div class="field-err" id="errEmail">Please enter a valid email.</div>

      <div class="input-wrap" id="wrapPass">
        <input type="password" id="regPass" placeholder="Password" autocomplete="new-password" />
        <button class="eye-btn" onclick="togglePwd()" aria-label="Show/hide password" tabindex="-1">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943
                 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="field-err" id="errPass">Password must be at least 6 characters.</div>

      <button class="btn-signup" onclick="handleRegister()">Register Now</button>

      <p class="switch-text">
        Already have account? <a href="../login/login.html">Login</a>
      </p>
    </div>
  </div>

  <div class="right">
    <div class="brand">Aether <span>.</span></div>

    <div class="hero-copy">
      <h1>Start</h1>
      <h1>Your</h1>
      <h1>Journey</h1>
      <h1>with Us!</h1>
    </div>

    <img class="student-img" src="assets/student.png" alt="Student" onerror="this.style.display='none'" />
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="register.js"></script>
</body>
</html>
